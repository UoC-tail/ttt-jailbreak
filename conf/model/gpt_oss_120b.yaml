# GPT-OSS 120B (Tinker API only — no local model loading)
# MoE model: 117B total, 5.1B active per token
name: openai/gpt-oss-120b

# Tokenizer loaded via tinker_cookbook, not HuggingFace
tokenizer:
  _target_: transformers.AutoTokenizer.from_pretrained
  pretrained_model_name_or_path: ${model.name}
  trust_remote_code: true
  padding_side: "left"

# LLM config not used for Tinker (model runs in the cloud)
llm:
  _target_: transformers.AutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: ${model.name}
  device_map: "auto"
  trust_remote_code: true

  dtype:
    _target_: hydra.utils.get_object
    path: torch.bfloat16
