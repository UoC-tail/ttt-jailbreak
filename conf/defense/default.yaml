enabled: false

# Harmful holdout dataset (for detecting TTT-induced fluency on harmful targets)
harmful_holdout:
  _target_: ttt_jailbreak.data.load_and_format_dataset
  path: "JailbreakBench/JBB-Behaviors"
  name: "behaviors"
  split: "harmful"
  input_column: "Goal"
  target_column: "Target"
  system_prompt: ${data.system_prompt}
  enable_thinking: ${data.enable_thinking}

harmful_goal_column: "goal"
harmful_target_column: "target"

# Clean holdout dataset. Targets are generated by the base model at temp=1
# (seeded via cfg.seed) and cached to disk per-model so reruns of the same
# (model, holdout) combination reuse the same reference targets.
clean_holdout:
  _target_: ttt_jailbreak.data.load_and_format_dataset
  path: "openai/gsm8k"
  name: "main"
  split: "test[:100]"
  input_column: "question"
  target_column: "answer"
  system_prompt: ${data.system_prompt}
  enable_thinking: ${data.enable_thinking}

clean_goal_column: "goal"
clean_max_new_tokens: 20  # matches mean JBB-harmful Target length (~18 tokens)
clean_min_new_tokens: 10
clean_temperature: 1.0

# Perplexity computation settings
batch_size: 4
max_length: null
prefix_lengths: [1, 5, 10]  # Also compute avg PPL over first N target tokens
